apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-discovery-service
  labels:
    app: device-discovery-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: device-discovery-service
  template:
    metadata:
      labels:
        app: device-discovery-service
        tier: backend
    spec:
      containers:
        - name: device-discovery-service
          image: 744561091152.dkr.ecr.us-east-1.amazonaws.com/zerotheft/zt-inf-device-discovery-service:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: device-discovery-service-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
