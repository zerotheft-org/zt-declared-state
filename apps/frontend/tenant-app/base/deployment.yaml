apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-app
  labels:
    app: tenant-app
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-app
  template:
    metadata:
      labels:
        app: tenant-app
        tier: frontend
    spec:
      containers:
        - name: tenant-app
          image: 744561091152.dkr.ecr.us-east-1.amazonaws.com/zerotheft/zt-fe-tenant-app:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: tenant-app-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
