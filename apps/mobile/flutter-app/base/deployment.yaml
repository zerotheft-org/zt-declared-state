apiVersion: apps/v1
kind: Deployment
metadata:
  name: flutter-app
  labels:
    app: flutter-app
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flutter-app
  template:
    metadata:
      labels:
        app: flutter-app
        tier: frontend
    spec:
      containers:
        - name: flutter-app
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/zerotheft/zt-mo-app:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: flutter-app-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
