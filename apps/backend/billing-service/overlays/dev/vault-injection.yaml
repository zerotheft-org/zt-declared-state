# Vault Agent Sidecar Injection Patch
#
# Injects secrets from Vault into /vault/secrets/ files:
#   - /vault/secrets/db     (database credentials)
#   - /vault/secrets/stripe (Stripe API keys)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
spec:
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "billing-service"
        vault.hashicorp.com/agent-pre-populate: "true"
        vault.hashicorp.com/agent-run-as-user: "65534"
        vault.hashicorp.com/agent-inject-secret-db: "secret/billing-service/db"
        vault.hashicorp.com/agent-inject-template-db: |
          {{ with secret "secret/billing-service/db" -}}
          DB_HOST={{ .Data.data.host }}
          DB_PORT={{ .Data.data.port }}
          DB_NAME={{ .Data.data.database }}
          DB_USER={{ .Data.data.username }}
          DB_PASSWORD={{ .Data.data.password }}
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-stripe: "secret/billing-service/stripe"
        vault.hashicorp.com/agent-inject-template-stripe: |
          {{ with secret "secret/billing-service/stripe" -}}
          STRIPE_API_KEY={{ .Data.data.api_key }}
          STRIPE_WEBHOOK_SECRET={{ .Data.data.webhook_secret }}
          {{- end }}
    spec:
      serviceAccountName: dev-billing-service
