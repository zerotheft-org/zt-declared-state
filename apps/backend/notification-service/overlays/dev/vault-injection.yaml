# Vault Agent Sidecar Injection Patch
#
# Injects secrets from Vault into /vault/secrets/ files:
#   - /vault/secrets/smtp   (SMTP credentials)
#   - /vault/secrets/slack  (Slack webhook)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "notification-service"
        vault.hashicorp.com/agent-pre-populate: "true"
        vault.hashicorp.com/agent-run-as-user: "65534"
        vault.hashicorp.com/agent-inject-secret-smtp: "secret/notification-service/smtp"
        vault.hashicorp.com/agent-inject-template-smtp: |
          {{ with secret "secret/notification-service/smtp" -}}
          SMTP_HOST={{ .Data.data.host }}
          SMTP_PORT={{ .Data.data.port }}
          SMTP_USER={{ .Data.data.username }}
          SMTP_PASS={{ .Data.data.password }}
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-slack: "secret/notification-service/slack"
        vault.hashicorp.com/agent-inject-template-slack: |
          {{ with secret "secret/notification-service/slack" -}}
          SLACK_WEBHOOK_URL={{ .Data.data.webhook_url }}
          {{- end }}
    spec:
      serviceAccountName: dev-notification-service
