apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config-script
  namespace: vault
data:
  configure.sh: |
    #!/bin/sh
    set -e
    
    export VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
    
    echo "Waiting for Vault to be ready..."
    until vault status > /dev/null 2>&1; do
      echo "Vault not ready yet, waiting..."
      sleep 5
    done
    
    echo "Checking if Vault is initialized..."
    INIT_STATUS=$(vault status -format=json 2>/dev/null | jq -r '.initialized' || echo "false")
    
    if [ "$INIT_STATUS" != "true" ]; then
      echo "Vault is not initialized. Run 'vault-setup.yml' workflow with action=init first."
      exit 1
    fi
    
    # Check if already sealed (with auto-unseal it should be unsealed)
    SEAL_STATUS=$(vault status -format=json 2>/dev/null | jq -r '.sealed' || echo "true")
    if [ "$SEAL_STATUS" = "true" ]; then
      echo "Vault is sealed. Cannot configure."
      exit 1
    fi
    
    echo "Vault is initialized and unsealed. Configuring..."
    
    # Login with root token (passed as env var)
    if [ -z "$VAULT_TOKEN" ]; then
      echo "VAULT_TOKEN environment variable is required"
      exit 1
    fi
    
    vault login "$VAULT_TOKEN" > /dev/null
    echo "Logged in as root"
    
    # Enable Kubernetes auth
    echo "Enabling Kubernetes auth..."
    vault auth enable kubernetes 2>/dev/null || echo "Kubernetes auth already enabled"
    
    # Get service account token and CA cert for Kubernetes auth config
    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    CA_CERT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/ca.crt)
    
    # Write Kubernetes auth config
    echo "Configuring Kubernetes auth..."
    vault write auth/kubernetes/config \
      kubernetes_host="https://kubernetes.default.svc.cluster.local:443" \
      token_reviewer_jwt="$TOKEN" \
      kubernetes_ca_cert="$CA_CERT" \
      issuer="https://kubernetes.default.svc.cluster.local"
    
    # Enable KV v2 secrets engine
    echo "Enabling KV v2 secrets engine..."
    vault secrets enable -path=secret kv-v2 2>/dev/null || echo "KV engine already enabled"
    
    # Create sample secrets for services
    echo "Creating secrets..."
    
    # Auth service secrets
    vault kv put secret/auth-service/db \
      host="postgres.zerotheft-dev.svc.cluster.local" \
      port="5432" \
      database="auth" \
      username="auth_user" \
      password="$(openssl rand -base64 32)"
    
    vault kv put secret/auth-service/jwt \
      secret="$(openssl rand -base64 64)"
    
    vault kv put secret/auth-service/redis \
      host="redis.zerotheft-dev.svc.cluster.local" \
      port="6379" \
      password="$(openssl rand -base64 32)"
    
    # Audit service secrets
    vault kv put secret/audit-service/db \
      host="postgres.zerotheft-dev.svc.cluster.local" \
      port="5432" \
      database="audit" \
      username="audit_user" \
      password="$(openssl rand -base64 32)"
    
    # Billing service secrets
    vault kv put secret/billing-service/db \
      host="postgres.zerotheft-dev.svc.cluster.local" \
      port="5432" \
      database="billing" \
      username="billing_user" \
      password="$(openssl rand -base64 32)"
    
    vault kv put secret/billing-service/stripe \
      api_key="sk_test_$(openssl rand -hex 24)" \
      webhook_secret="whsec_$(openssl rand -hex 24)"
    
    # Notification service secrets
    vault kv put secret/notification-service/smtp \
      host="smtp.sendgrid.net" \
      port="587" \
      username="apikey" \
      password="$(openssl rand -base64 32)"
    
    vault kv put secret/notification-service/slack \
      webhook_url="https://hooks.slack.com/services/$(openssl rand -hex 12)/$(openssl rand -hex 12)"
    
    # Create policies
    echo "Creating policies..."
    
    vault policy write auth-service - <<EOF
    path "secret/data/auth-service/*" {
      capabilities = ["read"]
    }
    EOF
    
    vault policy write audit-service - <<EOF
    path "secret/data/audit-service/*" {
      capabilities = ["read"]
    }
    EOF
    
    vault policy write billing-service - <<EOF
    path "secret/data/billing-service/*" {
      capabilities = ["read"]
    }
    EOF
    
    vault policy write notification-service - <<EOF
    path "secret/data/notification-service/*" {
      capabilities = ["read"]
    }
    EOF
    
    vault policy write saas-app - <<EOF
    path "secret/data/saas-app/*" {
      capabilities = ["read"]
    }
    path "secret/data/shared/*" {
      capabilities = ["read"]
    }
    EOF
    
    # Create Kubernetes auth roles for each service
    echo "Creating Kubernetes auth roles..."
    
    vault write auth/kubernetes/role/auth-service \
      bound_service_account_names="dev-auth-service" \
      bound_service_account_namespaces="zerotheft-dev" \
      policies="auth-service" \
      ttl="1h"
    
    vault write auth/kubernetes/role/audit-service \
      bound_service_account_names="dev-audit-service" \
      bound_service_account_namespaces="zerotheft-dev" \
      policies="audit-service" \
      ttl="1h"
    
    vault write auth/kubernetes/role/billing-service \
      bound_service_account_names="dev-billing-service" \
      bound_service_account_namespaces="zerotheft-dev" \
      policies="billing-service" \
      ttl="1h"
    
    vault write auth/kubernetes/role/notification-service \
      bound_service_account_names="dev-notification-service" \
      bound_service_account_namespaces="zerotheft-dev" \
      policies="notification-service" \
      ttl="1h"
    
    vault write auth/kubernetes/role/saas-app \
      bound_service_account_names="dev-saas-app" \
      bound_service_account_namespaces="zerotheft-dev" \
      policies="saas-app" \
      ttl="1h"
    
    echo ""
    echo "=== Vault Configuration Complete ==="
    echo ""
    echo "Auth methods:"
    vault auth list
    echo ""
    echo "Secrets engines:"
    vault secrets list
    echo ""
    echo "Policies:"
    vault policy list
    echo ""
    echo "Kubernetes roles:"
    vault list auth/kubernetes/role
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-configure
  namespace: vault
spec:
  template:
    spec:
      serviceAccountName: vault
      restartPolicy: OnFailure
      containers:
        - name: vault-cli
          image: hashicorp/vault:1.18
          command: ["/bin/sh", "/scripts/configure.sh"]
          env:
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-root-token
                  key: token
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: vault-config-script
            defaultMode: 0755
